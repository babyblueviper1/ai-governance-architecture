<!DOCTYPE html>
<html>
<head>
<title>DRVL AI Governance Demo</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;
    background: #f4f6f8;
}

h1 {
    margin-bottom: 10px;
}

p {
    color: #555;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

.run-btn {
    background: #2d7ef7;
    color: white;
}

.auto-btn {
    background: #222;
    color: white;
}

.stop-btn {
    background: #cc3b3b;
    color: white;
}

#result {
    margin-top: 20px;
    font-size: 16px;
}

#events {
    margin: 40px auto;
    width: 700px;
    text-align: left;
    background: white;
    padding: 20px;
    border-radius: 8px;
    height: 300px;
    overflow-y: scroll;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
    font-family: monospace;
}

.event-line {
    padding: 4px 0;
    border-bottom: 1px solid #eee;
}

</style>

</head>

<body>

<h1>Distributed Runtime Verification Layer</h1>

<p>Monitoring AI actions under DRVL governance.</p>

<button class="run-btn" onclick="runDemo()">Run AI Action</button>

<button class="auto-btn" onclick="startAuto()">Start Autonomous Mode</button>

<button class="stop-btn" onclick="stopAuto()">Stop Autonomous Mode</button>

<div id="result"></div>

<h2>Live Governance Events</h2>

<div id="events"></div>

<script>

let autoInterval = null

async function runDemo() {

    const response = await fetch("/run")
    const data = await response.json()

    document.getElementById("result").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>"
}

function startAuto() {

    if (autoInterval) return

    autoInterval = setInterval(runDemo, 2000)
}

function stopAuto() {

    clearInterval(autoInterval)
    autoInterval = null
}

const eventBox = document.getElementById("events")

const source = new EventSource("/events")

source.onmessage = function(event) {

    const data = JSON.parse(event.data)

    const line = document.createElement("div")
    line.className = "event-line"

    line.innerText =
        data.timestamp +
        " | " +
        data.status +
        " | " +
        data.action +
        " " +
        data.table

    eventBox.prepend(line)
}

</script>

</body>
</html>
