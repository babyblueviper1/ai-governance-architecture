<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRVL Governance Demo — Probabilistic Agent</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f8f9fa;
color:#212529;
margin:0;
padding:30px 20px;
line-height:1.5;
}

h1{
margin:0 0 8px;
font-size:2.1rem;
text-align:center;
}

.subtitle{
color:#6c757d;
margin-bottom:24px;
text-align:center;
}

.controls{
margin:24px 0;
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
align-items:center;
}

button{
padding:10px 22px;
font-size:15px;
font-weight:500;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
transition:all .2s ease;
position:relative;
overflow:hidden;
}

button:hover:not(:disabled){opacity:.92}
button:disabled{opacity:.6;cursor:not-allowed;background:#6c757d!important}

button.loading::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:16px;
height:16px;
border:3px solid white;
border-top-color:transparent;
border-radius:50%;
animation:spin 1s linear infinite;
transform:translate(-50%,-50%);
}

@keyframes spin{
to{transform:translate(-50%,-50%) rotate(360deg)}
}

.btn-run{background:#0d6efd}
.btn-auto{background:#343a40}
.btn-stop{background:#dc3545}
.btn-approve{background:#198754;padding:6px 14px;font-size:13px}
.btn-deny{background:#dc3545;padding:6px 14px;font-size:13px}

.speed-control{display:flex;align-items:center;gap:12px}
input[type="range"]{width:180px}

#stats{
display:flex;
justify-content:center;
gap:32px;
font-size:1.1rem;
margin:24px 0;
font-weight:600
}

.stat-executed{color:#198754}
.stat-blocked{color:#dc3545}
.stat-approved{color:#198754}

.panel{
max-width:780px;
margin:28px auto;
background:white;
border-radius:10px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
padding:24px
}

.allowed{color:#198754}
.restricted{color:#dc3545}

#alerts{
min-height:28px;
padding:12px;
margin:16px auto;
max-width:780px;
border-radius:6px;
font-weight:600;
background:#f8d7da;
color:#721c24;
text-align:center
}

#decision b{color:#343a40}

#events{
max-height:320px;
overflow-y:auto;
background:#f1f3f5;
border-radius:8px;
padding:8px
}

.event-line{
padding:8px 12px;
margin:4px 0;
border-radius:4px;
font-family:Consolas,monospace;
font-size:.95rem
}

.event-executed{background:#d4edda;color:#155724}
.event-blocked{background:#f8d7da;color:#721c24}
.event-pending{background:#fff3cd;color:#856404}
.event-approved{background:#cce5ff;color:#004085;font-weight:600}

.queue-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
margin:10px 0;
border-radius:6px;
background:#f8f9fa;
border:1px solid #dee2e6
}

.queue-item.pending{background:#fff3cd;border-color:#ffeeba}
.queue-item.approved{background:#d4edda;border-color:#c3e6cb;font-weight:500}
.queue-item.denied{background:#f8d7da;border-color:#f5c6cb;color:#721c24}

.integrity-ok{
color:#198754;
font-weight:600
}

.integrity-warn{
color:#dc3545;
font-weight:600
}

.meta{
margin-top:10px;
font-size:.9rem;
color:#495057;
font-family:monospace;
}

</style>
</head>

<body>

<h1>DRVL Governance Demo</h1>
<div class="subtitle">Deterministic runtime governance of a probabilistic AI agent</div>

<div class="panel" style="background:#f0f8ff;border-left:4px solid #0d6efd">
<p style="margin:0;font-weight:500">
Current Policy Hash:
<code id="current-policy-hash">—</code>
</p>
<p style="font-size:.85rem;color:#6c757d;margin-top:6px">
All events and decisions must match this policy hash.
</p>
</div>

<div id="alerts"></div>

<div class="panel">
<h2>Latest Policy Decision</h2>

<div id="decision">

<div><b>Action:</b> <span id="decAction">—</span></div>
<div><b>Rule / Status:</b> <span id="decRule">—</span></div>
<div><b>Result:</b> <span id="decResult">—</span></div>

<div class="meta">
Policy: <code id="decPolicy">—</code>
</div>

<div class="meta">
Signature: <code id="decSig">—</code>
</div>

<div class="meta">
Integrity: <span id="integrityStatus">—</span>
</div>

</div>
</div>

<div class="panel">
<h2>Live Governance Events</h2>
<div id="events"></div>
</div>

<script>

const els={
executed:document.getElementById("executedCount"),
blocked:document.getElementById("blockedCount"),
approved:document.getElementById("approvedCount"),
alerts:document.getElementById("alerts"),
events:document.getElementById("events"),
dec:{
action:document.getElementById("decAction"),
rule:document.getElementById("decRule"),
result:document.getElementById("decResult")
}
}

function shortHash(h){
if(!h) return "—"
if(h.length<12) return h
return h.slice(0,8)+"…"+h.slice(-4)
}

function handleResponse(data){

if(!data||!data.action) return

const ts=data.timestamp||new Date().toLocaleTimeString([], {hour12:false})
const actionStr=`${data.action} ${data.table||""}`.trim()

els.dec.action.textContent=actionStr
els.dec.result.textContent=data.status
els.dec.rule.textContent=data.message||""

document.getElementById("decPolicy").textContent=shortHash(data.policy)
document.getElementById("decSig").textContent=shortHash(data.signature)

const currentPolicy=document.getElementById("current-policy-hash").textContent

let integrityEl=document.getElementById("integrityStatus")

if(data.policy && currentPolicy && data.policy.startsWith(currentPolicy.slice(0,8))){
integrityEl.textContent="✓ Policy match"
integrityEl.className="integrity-ok"
}
else{
integrityEl.textContent="⚠ Policy mismatch"
integrityEl.className="integrity-warn"
}

const line=document.createElement("div")

line.className="event-line event-"+data.status.toLowerCase()

line.innerHTML=`
[${ts}] ${data.status} ${actionStr}
| policy=${shortHash(data.policy)}
| sig=${shortHash(data.signature)}
`

els.events.prepend(line)

if(els.events.children.length>200)
els.events.removeChild(els.events.lastChild)

}

const evtSource=new EventSource("/events")

evtSource.onmessage=event=>{
try{
handleResponse(JSON.parse(event.data))
}
catch(e){
console.error(e)
}
}

window.addEventListener("load",()=>{

fetch("/policy_hash")
.then(r=>r.json())
.then(data=>{
document.getElementById("current-policy-hash").textContent=data.policy_hash||"—"
})

})

</script>

</body>
</html>
