<!DOCTYPE html>
<html>
<head>
<title>DRVL Demo</title>
<style>

body {
    font-family: Arial;
    text-align: center;
    margin-top: 80px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}

#result {
    margin-top: 30px;
    font-size: 18px;
}

</style>
</head>

<body>

<h1>Distributed Runtime Verification Layer</h1>

<p>Simulating AI database actions under DRVL governance.</p>

<button onclick="runDemo()">Run AI Action</button>

<div id="result"></div>

<script>

async function runDemo() {

    const response = await fetch("/run")
    const data = await response.json()

    document.getElementById("result").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>"
}

</script>

</body>
</html>
